{% extends 'base.html' %} {% load humanize %} {% block content %}
<section class="page-section page-news">
  <div class="section-inner">
    <h1>Tin tức & Cập nhật</h1>
    <p>
      Đọc những bài viết mới nhất về quản lý tài chính, tiết kiệm và cách sử
      dụng Finance Tracker hiệu quả.
    </p>

    <div class="news-grid">
      {% for article in articles %}
      <article class="news-card">
        <h2>{{ article.title }}</h2>
        <p>{{ article.summary }}</p>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
