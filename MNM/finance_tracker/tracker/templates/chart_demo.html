<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biểu đồ Thu vs Chi - Finance Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem 0;
      }

      body.theme-dark {
        background: #0f172a;
        color: #f8fafc;
      }

      body.theme-dark h1,
      body.theme-dark h2,
      body.theme-dark h3,
      body.theme-dark p {
        color: #f8fafc;
      }

      body.theme-dark .chart-container {
        background: #111827;
        color: #f8fafc;
      }

      body.theme-dark .chart-header h2 {
        color: #f8fafc;
      }

      body.theme-dark .chart-header p {
        color: #cbd5e1;
      }

      .chart-container {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: 0 auto;
      }

      .chart-header {
        margin-bottom: 2rem;
        text-align: center;
      }

      .chart-header h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: #1f2937;
        margin-bottom: 0.5rem;
      }

      .chart-header p {
        color: #6b7280;
        font-size: 0.95rem;
      }

      .chart-wrapper {
        position: relative;
        height: 400px;
        margin-bottom: 2rem;
      }

      .stats-summary {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1rem;
        margin-top: 2rem;
      }

      .stat-box {
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        padding: 1.5rem;
        border-radius: 10px;
        text-align: center;
      }

      .stat-label {
        font-size: 0.85rem;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 800;
        color: #1f2937;
      }

      .stat-box.income {
        background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
      }

      .stat-box.income .stat-value {
        color: #10b981;
      }

      .stat-box.expense {
        background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      }

      .stat-box.expense .stat-value {
        color: #ef4444;
      }

      .stat-box.balance {
        background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      }

      .stat-box.balance .stat-value {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="chart-container">
      <!-- Header -->
      <div class="chart-header">
        <h2>
          <i class="fas fa-chart-bar me-2" style="color: #2563eb"></i>
          Thu vs Chi
        </h2>
        <p>So sánh tổng thu nhập và chi tiêu</p>
      </div>

      <!-- Chart -->
      <div class="chart-wrapper">
        <canvas id="incomeExpenseChart"></canvas>
      </div>

      <!-- Statistics Summary -->
      <div class="stats-summary">
        <div class="stat-box income">
          <div class="stat-label">Tổng Thu Nhập</div>
          <div class="stat-value">{{ total_income|floatformat:0 }}₫</div>
        </div>
        <div class="stat-box expense">
          <div class="stat-label">Tổng Chi Tiêu</div>
          <div class="stat-value">{{ total_expense|floatformat:0 }}₫</div>
        </div>
        <div class="stat-box balance">
          <div class="stat-label">Số Dư</div>
          <div class="stat-value">
            {{ total_income|add:total_expense|floatformat:0 }}₫
          </div>
        </div>
      </div>
    </div>

    <script>
      // Lấy dữ liệu từ Django
      const incomeData = {{ total_income|default:"0" }};
      const expenseData = {{ total_expense|default:"0" }};

      // Khởi tạo Chart.js
      const ctx = document.getElementById('incomeExpenseChart').getContext('2d');
      const chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Thu Nhập', 'Chi Tiêu'],
          datasets: [
            {
              label: 'Số tiền (₫)',
              data: [incomeData, expenseData],
              backgroundColor: [
                'rgba(16, 185, 129, 0.8)',    // Xanh lá (income)
                'rgba(239, 68, 68, 0.8)'      // Đỏ (expense)
              ],
              borderColor: [
                'rgba(16, 185, 129, 1)',
                'rgba(239, 68, 68, 1)'
              ],
              borderWidth: 2,
              borderRadius: 8,
              hoverBackgroundColor: [
                'rgba(16, 185, 129, 1)',
                'rgba(239, 68, 68, 1)'
              ]
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: {
                font: {
                  size: 14,
                  weight: 600
                },
                color: '#374151',
                padding: 15,
                usePointStyle: true,
                pointStyle: 'circle'
              }
            },
            tooltip: {
              backgroundColor: 'rgba(31, 41, 55, 0.9)',
              padding: 12,
              titleFont: {
                size: 14,
                weight: 'bold'
              },
              bodyFont: {
                size: 13
              },
              borderColor: 'rgba(31, 41, 55, 1)',
              borderWidth: 1,
              cornerRadius: 6,
              displayColors: true,
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) {
                    label += ': ';
                  }
                  const value = context.parsed.y;
                  label += new Intl.NumberFormat('vi-VN', {
                    style: 'currency',
                    currency: 'VND'
                  }).format(value);
                  return label;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: {
                  size: 12
                },
                color: '#6b7280',
                callback: function(value) {
                  // Format as currency
                  if (value >= 1000000) {
                    return (value / 1000000).toFixed(1) + 'M';
                  } else if (value >= 1000) {
                    return (value / 1000).toFixed(1) + 'K';
                  }
                  return value;
                }
              },
              grid: {
                color: 'rgba(0, 0, 0, 0.05)',
                drawBorder: false
              }
            },
            x: {
              ticks: {
                font: {
                  size: 13,
                  weight: 600
                },
                color: '#374151'
              },
              grid: {
                display: false
              }
            }
          }
        }
      });
    </script>
  </body>
</html>
